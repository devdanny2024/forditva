name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/android-apk.yml'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FLUTTER_VERSION: '3.41.1'
      DOTENV: ${{ secrets.DOTENV }}
      ANDROID_DEBUG_KEYSTORE: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.lock') }}

      # The release build type signs with the debug key (android/app/build.gradle.kts).
      # A runner-generated debug key would change the APK signature, and Android
      # refuses to install an update whose signature differs from the installed
      # app. Restoring the project's own debug keystore keeps testers able to
      # install over the top instead of uninstalling first.
      - name: Restore debug keystore
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_DEBUG_KEYSTORE:-}" ]; then
            echo "::warning::ANDROID_DEBUG_KEYSTORE secret is not set. The runner will"
            echo "::warning::generate a fresh debug key, so this APK's signature will differ"
            echo "::warning::from earlier builds and testers must uninstall before installing."
            exit 0
          fi
          mkdir -p ~/.android
          printf '%s' "$ANDROID_DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore
          echo "debug.keystore restored ($(wc -c < ~/.android/debug.keystore) bytes)"

      - name: Write .env (bundled Flutter asset with API keys)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DOTENV:-}" ]; then
            echo "ERROR: DOTENV secret is empty. Set it with: gh secret set DOTENV < .env"
            exit 1
          fi
          printf '%s' "$DOTENV" > .env
          echo ".env written ($(wc -c < .env) bytes)"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK with version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr '+' '-')
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/forditva-${VERSION}.apk"
          ls -la dist/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forditva-apk
          path: dist/*.apk
          if-no-files-found: error
