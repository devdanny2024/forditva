name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/android-apk.yml'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FLUTTER_VERSION: '3.41.1'
      DOTENV: ${{ secrets.DOTENV }}
      ANDROID_DEBUG_KEYSTORE: ${{ secrets.ANDROID_DEBUG_KEYSTORE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('pubspec.lock') }}

      # The release build type signs with the debug key (android/app/build.gradle.kts).
      # A runner-generated debug key changes the APK signature, which makes
      # Android refuse the install and makes Play Protect flag the app as coming
      # from an unknown developer. build.gradle.kts reads FORDITVA_DEBUG_KEYSTORE
      # so the key is chosen explicitly rather than by whatever Gradle finds.
      - name: Restore debug keystore
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_DEBUG_KEYSTORE:-}" ]; then
            echo "ERROR: ANDROID_DEBUG_KEYSTORE secret is not set. Set it with:"
            echo "  base64 -w0 ~/.android/debug.keystore | gh secret set ANDROID_DEBUG_KEYSTORE"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_DEBUG_KEYSTORE" | base64 -d \
            > "$RUNNER_TEMP/signing/debug.keystore"
          echo "FORDITVA_DEBUG_KEYSTORE=$RUNNER_TEMP/signing/debug.keystore" >> "$GITHUB_ENV"
          keytool -list -v -keystore "$RUNNER_TEMP/signing/debug.keystore" \
            -storepass android -alias androiddebugkey | grep 'SHA256:'

      - name: Write .env (bundled Flutter asset with API keys)
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DOTENV:-}" ]; then
            echo "ERROR: DOTENV secret is empty. Set it with: gh secret set DOTENV < .env"
            exit 1
          fi
          printf '%s' "$DOTENV" > .env
          echo ".env written ($(wc -c < .env) bytes)"

      - name: Flutter pub get
        run: flutter pub get

      # android/gradle.properties caps the JVM at 1536m because the Windows dev
      # machine builds under memory pressure. Jetifier rewriting the Flutter
      # engine jars runs out of heap at that size here, so give the runner room.
      - name: Raise Gradle heap for the runner
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/^org\.gradle\.jvmargs=.*/org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g/' \
            android/gradle.properties
          grep '^org.gradle.jvmargs=' android/gradle.properties

      - name: Build APK
        run: flutter build apk --release

      # A silently wrong signature is worse than a failed build: the APK installs
      # nowhere and Play Protect blocks it, which is what happened when the
      # runner quietly used its own generated key (Markus, 2026-07-15).
      - name: Verify APK signature matches the expected key
        shell: bash
        env:
          EXPECTED_SHA256: ${{ vars.ANDROID_SIGNING_SHA256 }}
        run: |
          set -euo pipefail
          APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort | tail -n 1)
          ACTUAL=$("$APKSIGNER" verify --print-certs \
            build/app/outputs/flutter-apk/app-release.apk \
            | grep -i 'SHA-256 digest' | head -n 1 | awk '{print $NF}')
          echo "APK signer SHA-256: $ACTUAL"
          if [ -z "${EXPECTED_SHA256:-}" ]; then
            echo "::warning::ANDROID_SIGNING_SHA256 variable not set; skipping comparison."
            exit 0
          fi
          if [ "$ACTUAL" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: APK is signed with the wrong key."
            echo "  expected: $EXPECTED_SHA256"
            echo "  actual:   $ACTUAL"
            echo "Testers could not install this build over their existing app."
            exit 1
          fi
          echo "Signature matches the expected key."

      - name: Rename APK with version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr '+' '-')
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/forditva-${VERSION}.apk"
          ls -la dist/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forditva-apk
          path: dist/*.apk
          if-no-files-found: error
